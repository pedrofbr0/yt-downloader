services:
  yt-downloader:
    build: .
    container_name: yt-downloader
    restart: unless-stopped
    volumes:
      # Pasta de saída persistida no host
      - ./downloads:/app/downloads
      # Credenciais — nunca comitar o secrets.toml real
      - ./.streamlit/secrets.toml:/app/.streamlit/secrets.toml:ro
    expose:
      - "8501"
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - yt-downloader
    networks:
      - app-net

networks:
  app-net:
    name: app-net
