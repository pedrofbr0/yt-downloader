services:
  yt-downloader:
    build: .
    container_name: yt-downloader
    restart: unless-stopped
    environment:
      APP_ENV: production
      YT_DOWNLOAD_DIR: /app/downloads
      YT_DOWNLOAD_RETENTION_SECONDS: 10800
      YT_DOWNLOAD_CLEANUP_INTERVAL_SECONDS: 10800
    volumes:
      # Pasta de saída persistida no host
      - ./downloads:/app/downloads
      # Credenciais — nunca comitar o secrets.toml real
      - ./.streamlit/secrets.toml:/app/.streamlit/secrets.toml:ro
    expose:
      - "8501"
    ports:
      - "127.0.0.1:8501:8501"
    networks:
      - app-net

networks:
  app-net:
    name: app-net
