worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ----------------------------------------------------------------
    # Upstream: yt-downloader (Streamlit)
    # ----------------------------------------------------------------
    upstream yt_downloader {
        server yt-downloader:8501;
    }

    # ----------------------------------------------------------------
    # Upstream: n8n  (descomente quando conectar n8n à rede app-net)
    # ----------------------------------------------------------------
    # upstream n8n {
    #     server n8n:5678;
    # }

    # ----------------------------------------------------------------
    # Mapa para suporte a WebSocket (necessário para o Streamlit)
    # ----------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ----------------------------------------------------------------
    # Servidor principal (acesso por IP — sem domínio por enquanto)
    # Para usar com domínio, substitua server_name _ por seu domínio
    # e adicione o bloco TLS abaixo.
    # ----------------------------------------------------------------
    server {
        listen 80;
        server_name _;   # aceita qualquer host / acesso direto por IP

        # ---- yt-downloader: raiz do servidor ----
        location / {
            proxy_pass         http://yt_downloader;
            proxy_http_version 1.1;

            # WebSocket
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Downloads longos não devem sofrer timeout
            proxy_read_timeout    86400s;
            proxy_send_timeout    86400s;
            proxy_connect_timeout 60s;

            # Streamlit envia arquivos grandes via st.download_button
            client_max_body_size 0;
        }

        # ---- n8n: /n8n/  (descomente e ajuste quando integrar) ----
        # location /n8n/ {
        #     proxy_pass         http://n8n/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade    $http_upgrade;
        #     proxy_set_header Connection $connection_upgrade;
        #     proxy_set_header Host       $host;
        #     proxy_set_header X-Real-IP  $remote_addr;
        #     proxy_read_timeout 86400s;
        # }
    }

    # ----------------------------------------------------------------
    # BLOCO TLS (para quando adicionar domínio + Let's Encrypt)
    # ----------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name seudominio.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/seudominio.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/seudominio.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #
    #     location / {
    #         proxy_pass         http://yt_downloader;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade    $http_upgrade;
    #         proxy_set_header Connection $connection_upgrade;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_read_timeout 86400s;
    #         client_max_body_size 0;
    #     }
    # }
    #
    # Redireciona HTTP → HTTPS quando TLS ativo:
    # server {
    #     listen 80;
    #     server_name seudominio.com;
    #     return 301 https://$host$request_uri;
    # }
}
